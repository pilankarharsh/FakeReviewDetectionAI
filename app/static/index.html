<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Review Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Roboto', sans-serif;
    background-color: #f8f9fa;
    color: #333;
    line-height: 1.6;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    min-height: 100vh;
  }

  .header {
    background: #667eea;
    color: white;
    padding: 30px;
    text-align: center;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .header p {
    opacity: 0.9;
    font-size: 14px;
  }

  .content {
    padding: 30px 40px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #555;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px;
    border: 2px solid #e1e5e9;
    border-radius: 6px;
    font-size: 14px;
    resize: vertical;
    transition: border-color 0.3s;
  }

  textarea:focus {
    outline: none;
    border-color: #667eea;
  }

  .input-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
  }

  .input-row input {
    flex: 1;
    padding: 10px;
    border: 2px solid #e1e5e9;
    border-radius: 6px;
    font-size: 14px;
    transition: border-color 0.3s;
  }

  .input-row input:focus {
    outline: none;
    border-color: #667eea;
  }

  .examples {
    margin-bottom: 20px;
  }

  .examples span {
    font-size: 12px;
    color: #666;
    margin-right: 10px;
  }

  .example-btn {
    background: #f1f3f4;
    border: 1px solid #ddd;
    padding: 4px 12px;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
    margin-right: 8px;
    transition: background-color 0.3s;
  }

  .example-btn:hover {
    background: #e8eaed;
  }

  .analyze-btn {
    background: #667eea;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .analyze-btn:hover {
    background: #5a6fd8;
  }

  .analyze-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  .result {
    display: none;
    margin-top: 40px;
    border-top: 2px solid #e1e5e9;
    padding-top: 40px;
  }

  .result.show {
    display: block;
  }

  .verdict {
    padding: 30px 0;
    text-align: center;
    border-bottom: 1px solid #e1e5e9;
    margin-bottom: 30px;
  }

  .verdict.fake h2 {
    color: #dc3545;
  }

  .verdict.genuine h2 {
    color: #28a745;
  }

  .verdict h2 {
    font-size: 24px;
    margin-bottom: 5px;
  }

  .verdict p {
    font-size: 14px;
    opacity: 0.8;
  }

  .confidence {
    margin-bottom: 40px;
    padding-bottom: 30px;
    border-bottom: 1px solid #e1e5e9;
  }

  .confidence h3 {
    font-size: 18px;
    margin-bottom: 15px;
    color: #333;
  }

  .confidence-bar {
    height: 10px;
    background: #e1e5e9;
    border-radius: 5px;
    overflow: hidden;
    margin: 15px 0;
  }

  .confidence-fill {
    height: 100%;
    transition: width 0.5s ease;
  }

  .confidence-fill.fake {
    background: #dc3545;
  }

  .confidence-fill.genuine {
    background: #28a745;
  }

  .stats {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }

  .stat-box {
    flex: 1;
    text-align: center;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #333;
  }

  .stat-label {
    font-size: 13px;
    color: #666;
    margin-top: 5px;
  }

  .signals {
    margin-bottom: 40px;
    padding-bottom: 30px;
    border-bottom: 1px solid #e1e5e9;
  }

  .signals h3 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #333;
  }

  .signal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 30px;
  }

  .signal-item {
    text-align: center;
  }

  .signal-value {
    font-size: 20px;
    font-weight: 700;
    color: #667eea;
    margin-bottom: 5px;
  }

  .signal-label {
    font-size: 13px;
    color: #666;
  }

  .flags {
    margin-bottom: 20px;
  }

  .flags h3 {
    font-size: 18px;
    margin-bottom: 15px;
    color: #333;
  }

  .flag-tag {
    display: inline-block;
    background: #f8f9fa;
    color: #dc3545;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 13px;
    margin-right: 8px;
    margin-bottom: 8px;
    border: 1px solid #e1e5e9;
  }

  .no-flags {
    color: #28a745;
    font-size: 14px;
    font-weight: 500;
  }

  .error {
    background: #fee;
    border: 1px solid #fcc;
    color: #c33;
    padding: 15px;
    border-radius: 6px;
    margin-top: 15px;
    display: none;
  }

  .error.show {
    display: block;
  }

  .loading {
    text-align: center;
    padding: 20px;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #f3f3f3;
    border-top: 2px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @media (max-width: 600px) {
    .input-row {
      flex-direction: column;
    }
    
    .stats {
      flex-direction: column;
    }
    
    .signal-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>Review Checker</h1>
    <p>Analyze product reviews for authenticity</p>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Input Form -->
    <div class="form-group">
      <label for="reviewText">Review Text</label>
      <textarea id="reviewText" placeholder="Paste a product review here to check if it's genuine or fake..."></textarea>
    </div>

    <div class="examples">
      <span>Try examples:</span>
      <button class="example-btn" onclick="loadExample('fake')">Suspicious Review</button>
      <button class="example-btn" onclick="loadExample('genuine')">Genuine Review</button>
    </div>

    <div class="input-row">
      <input type="text" id="userId" placeholder="User ID (optional)">
      <input type="text" id="productId" placeholder="Product ID (optional)">
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Check Review</button>

    <!-- Error Message -->
    <div class="error" id="errorBox"></div>

    <!-- Results -->
    <div class="result" id="resultCard">

      <!-- Verdict -->
      <div class="verdict loading" id="verdictBanner">
        <div class="loading">
          <div class="spinner"></div>
          <p>Analyzing review...</p>
        </div>
      </div>

      <!-- Confidence -->
      <div class="confidence">
        <h3>Confidence Score</h3>
        <div class="confidence-bar">
          <div class="confidence-fill" id="barFill"></div>
        </div>
        <div class="stats">
          <div class="stat-box">
            <div class="stat-value" id="confPct">—</div>
            <div class="stat-label">Overall</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="fakeProb">—</div>
            <div class="stat-label">Fake</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="genuineProb">—</div>
            <div class="stat-label">Genuine</div>
          </div>
        </div>
      </div>

      <!-- Text Signals -->
      <div class="signals">
        <h3>Text Analysis</h3>
        <div class="signal-grid" id="signalsGrid"></div>
      </div>

      <!-- Red Flags -->
      <div class="flags" id="flagsSection">
        <h3>Warning Signs</h3>
        <div id="flagsList"></div>
      </div>

    </div>

  </div>

</div>

<script>
const EXAMPLES = {
  fake: "BEST PRODUCT EVER!!! I bought this and WOW amazing quality!! My whole family loves it so much!! Everyone should buy this RIGHT NOW!! 5 stars is not enough!! Will definitely recommend to ALL my friends!! Perfect in every way!! Thank you so much!!",
  genuine: "I've been using this for about three weeks. Build quality feels solid and it does what it advertises. Setup took around 20 minutes — the instructions could be clearer, but once configured it works reliably. Battery lasts 6–7 hours which matches the spec. Only real complaint is the strap feels cheap for the price. Overall decent value."
};

function loadExample(type) {
  document.getElementById('reviewText').value = EXAMPLES[type];
}

async function analyze() {
  const text = document.getElementById('reviewText').value.trim();
  if (!text || text.length < 5) {
    showError('Please enter at least 5 characters to analyze.');
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Checking...';
  hideError();

  showResultCard();
  resetResult();

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        user_id: document.getElementById('userId').value || 'unknown',
        product_id: document.getElementById('productId').value || 'unknown',
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Server error');
    }

    const data = await res.json();
    renderResult(data, text);

  } catch (e) {
    showError(e.message || 'Could not connect to the server. Please try again.');
    resetResult(true);
  }

  btn.disabled = false;
  btn.textContent = 'Check Review';
}

function showResultCard() {
  const card = document.getElementById('resultCard');
  card.classList.add('show');
  card.style.display = 'block';
}

function resetResult(error = false) {
  const banner = document.getElementById('verdictBanner');
  banner.className = 'verdict loading';
  
  if (error) {
    banner.innerHTML = '<div class="error">⚠ Error occurred while analyzing</div>';
  } else {
    banner.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analyzing review...</p></div>';
  }
  
  document.getElementById('confPct').textContent = '—';
  document.getElementById('fakeProb').textContent = '—';
  document.getElementById('genuineProb').textContent = '—';
  document.getElementById('barFill').style.width = '0';
  document.getElementById('barFill').className = 'confidence-fill';
  document.getElementById('signalsGrid').innerHTML = '';
  document.getElementById('flagsList').innerHTML = '';
}

function renderResult(data, text) {
  const isFake = data.fake_probability > 10;
  const cls = isFake ? 'fake' : 'genuine';

  // Verdict banner
  const banner = document.getElementById('verdictBanner');
  banner.className = `verdict ${cls}`;
  banner.innerHTML = `
    <h2>${isFake ? '⚠ Likely Fake' : '✓ Likely Genuine'}</h2>
    <p>${data.confidence}% confidence · ${data.signals.word_count} words analyzed</p>
  `;

  // Confidence scores
  document.getElementById('confPct').textContent = data.confidence + '%';
  document.getElementById('fakeProb').textContent = data.fake_probability + '%';
  document.getElementById('genuineProb').textContent = data.genuine_probability + '%';
  
  // Make fake probability red if above 10%
  const fakeProbElement = document.getElementById('fakeProb');
  if (data.fake_probability > 10) {
    fakeProbElement.style.color = '#dc3545';
  } else {
    fakeProbElement.style.color = '#333';
  }
  
  const fill = document.getElementById('barFill');
  fill.className = `confidence-fill ${cls}`;
  setTimeout(() => { fill.style.width = data.confidence + '%'; }, 100);

  // Text signals
  const grid = document.getElementById('signalsGrid');
  const signalLabels = {
    word_count: 'Word Count',
    lexical_diversity: 'Lexical Diversity',
    exclamation_ratio: 'Exclamation Ratio',
    avg_word_length: 'Avg Word Length',
    caps_ratio: 'Caps Ratio',
    repetition_score: 'Repetition Score'
  };
  
  grid.innerHTML = Object.entries(data.signals).map(([key, val]) => {
    const display = typeof val === 'number' && !Number.isInteger(val) ? val.toFixed(1) : val;
    return `<div class="signal-item">
      <div class="signal-value">${display}</div>
      <div class="signal-label">${signalLabels[key] || key}</div>
    </div>`;
  }).join('');

  // Red flags
  const flagsList = document.getElementById('flagsList');
  if (data.red_flags.length === 0) {
    flagsList.innerHTML = '<div class="no-flags">✓ No warning signs detected</div>';
  } else {
    // Make flags more prominent for fake reviews
    const flagColor = isFake ? '#dc3545' : '#666';
    const flagBg = isFake ? '#f8d7da' : '#f8f9fa';
    const flagBorder = isFake ? '#f5c6cb' : '#e1e5e9';
    
    flagsList.innerHTML = data.red_flags
      .map(f => `<span class="flag-tag" style="color: ${flagColor}; background: ${flagBg}; border-color: ${flagBorder};">${f}</span>`)
      .join('');
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

document.getElementById('reviewText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) analyze();
});
</script>
</body>
</html>
