<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fake Review Detector</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #0d0f12;
    --surface:  #13161b;
    --surface2: #1a1e25;
    --border:   #252931;
    --border2:  #303540;
    --text:     #e8eaf0;
    --muted:    #6b7385;
    --dim:      #9099ab;
    --fake:     #ff4757;
    --fake-bg:  #1f1015;
    --fake-dim: #7a2030;
    --real:     #2ed573;
    --real-bg:  #0d1f16;
    --real-dim: #1a6b3a;
    --accent:   #5b6bff;
    --accent-bg:#0f1230;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; width: 100%; max-width: 760px; padding: 48px 24px 80px; }

  /* ── Header ── */
  header { margin-bottom: 48px; }
  .tag-line {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  h1 span { color: var(--accent); }
  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
  }

  /* ── Textarea ── */
  .field-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    line-height: 1.7;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--border2); }
  textarea::placeholder { color: var(--muted); }

  /* ── Meta row ── */
  .meta-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .meta-input {
    flex: 1;
    min-width: 140px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .meta-input::placeholder { color: var(--muted); }
  .meta-input:focus { border-color: var(--border2); }

  /* ── Examples ── */
  .examples { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
  .ex-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .ex-btn {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ex-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Analyze button ── */
  .btn-row { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
  .analyze-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .analyze-btn:hover { opacity: 0.88; }
  .analyze-btn:active { transform: scale(0.97); }
  .analyze-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .shortcut { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── Result card ── */
  #resultCard { display: none; animation: fadeUp 0.3s ease; }
  #resultCard.show { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Verdict banner ── */
  .verdict-banner {
    border-radius: 10px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .verdict-banner.fake { background: var(--fake-bg); border: 1px solid var(--fake-dim); }
  .verdict-banner.genuine { background: var(--real-bg); border: 1px solid var(--real-dim); }
  .verdict-banner.loading { background: var(--surface2); border: 1px solid var(--border); }

  .verdict-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .verdict-banner.fake .verdict-icon { background: var(--fake-dim); }
  .verdict-banner.genuine .verdict-icon { background: var(--real-dim); }
  .verdict-banner.loading .verdict-icon { background: var(--border2); }

  .verdict-text h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 3px;
  }
  .verdict-banner.fake .verdict-text h2 { color: var(--fake); }
  .verdict-banner.genuine .verdict-text h2 { color: var(--real); }
  .verdict-banner.loading .verdict-text h2 { color: var(--muted); }
  .verdict-sub { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── Confidence bar ── */
  .conf-section { margin-bottom: 24px; }
  .conf-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .conf-header span { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .conf-header strong { color: var(--text); }
  .bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0;
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-fill.fake { background: var(--fake); }
  .bar-fill.genuine { background: var(--real); }

  /* ── Prob row ── */
  .prob-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .prob-chip {
    flex: 1;
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 16px;
    border: 1px solid var(--border);
  }
  .prob-chip .pc-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .prob-chip .pc-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .prob-chip.fake-chip .pc-val { color: var(--fake); }
  .prob-chip.genuine-chip .pc-val { color: var(--real); }

  /* ── Signals grid ── */
  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .signals-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  @media (max-width: 520px) { .signals-grid { grid-template-columns: repeat(2, 1fr); } }
  .signal-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .sc-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .sc-value { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
  .sc-bar { height: 3px; background: var(--border2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .sc-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  /* ── Red flags ── */
  .flags-section { margin-bottom: 20px; }
  .flags-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .flag-tag {
    background: var(--fake-bg);
    border: 1px solid var(--fake-dim);
    color: var(--fake);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .no-flags {
    font-size: 13px;
    color: var(--real);
    font-family: 'DM Mono', monospace;
  }

  /* ── History ── */
  #historyCard { display: none; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .history-item:last-child { border-bottom: none; padding-bottom: 0; }
  .history-item:first-child { padding-top: 0; }
  .history-item:hover { opacity: 0.75; }
  .h-badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .h-badge.fake { background: var(--fake-bg); color: var(--fake); border: 1px solid var(--fake-dim); }
  .h-badge.genuine { background: var(--real-bg); color: var(--real); border: 1px solid var(--real-dim); }
  .h-text { font-size: 12px; color: var(--dim); font-family: 'DM Mono', monospace; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-conf { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; flex-shrink: 0; }

  /* ── Spinner ── */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  .error-box {
    background: var(--fake-bg);
    border: 1px solid var(--fake-dim);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--fake);
    display: none;
    margin-top: 12px;
  }
  .error-box.show { display: block; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header>
    <p class="tag-line">// BERT-powered detection</p>
    <h1>Fake Review<br><span>Detector</span></h1>
    <p class="subtitle">→ trained on 650k+ reviews · 98.6% val accuracy</p>
  </header>

  <!-- Input Card -->
  <div class="card">
    <span class="field-label">Review text</span>
    <textarea id="reviewText" placeholder="Paste any product or service review here..."></textarea>

    <div class="examples">
      <span class="ex-label">examples →</span>
      <button class="ex-btn" onclick="loadExample('fake')">suspicious</button>
      <button class="ex-btn" onclick="loadExample('genuine')">genuine</button>
    </div>

    <div class="meta-row">
      <input class="meta-input" id="userId" type="text" placeholder="user_id (optional)" />
      <input class="meta-input" id="productId" type="text" placeholder="product_id (optional)" />
    </div>

    <div class="btn-row">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyze review</button>
      <span class="shortcut">or Ctrl + Enter</span>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Result Card -->
  <div class="card" id="resultCard">

    <!-- Verdict banner -->
    <div class="verdict-banner loading" id="verdictBanner">
      <div class="verdict-icon" id="verdictIcon">
        <div class="spinner"></div>
      </div>
      <div class="verdict-text">
        <h2 id="verdictLabel">Analyzing…</h2>
        <p class="verdict-sub" id="verdictSub">Running BERT inference</p>
      </div>
    </div>

    <!-- Confidence -->
    <div class="conf-section">
      <div class="conf-header">
        <span>Model confidence</span>
        <strong id="confPct">—</strong>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      <div class="prob-row">
        <div class="prob-chip fake-chip">
          <div class="pc-label">fake probability</div>
          <div class="pc-val" id="fakeProb">—</div>
        </div>
        <div class="prob-chip genuine-chip">
          <div class="pc-label">genuine probability</div>
          <div class="pc-val" id="genuineProb">—</div>
        </div>
      </div>
    </div>

    <!-- Signals -->
    <p class="section-title">text signals</p>
    <div class="signals-grid" id="signalsGrid"></div>

    <!-- Red flags -->
    <div class="flags-section" id="flagsSection">
      <p class="section-title">red flags</p>
      <div class="flags-list" id="flagsList"></div>
    </div>

  </div>

  <!-- History -->
  <div class="card" id="historyCard">
    <p class="section-title">recent checks</p>
    <div id="historyList"></div>
  </div>

</div>

<script>
const EXAMPLES = {
  fake: "BEST PRODUCT EVER!!! I bought this and WOW amazing quality!! My whole family loves it so much!! Everyone should buy this RIGHT NOW!! 5 stars is not enough!! Will definitely recommend to ALL my friends!! Perfect in every way!! Thank you so much!!",
  genuine: "I've been using this for about three weeks. Build quality feels solid and it does what it advertises. Setup took around 20 minutes — the instructions could be clearer, but once configured it works reliably. Battery lasts 6–7 hours which matches the spec. Only real complaint is the strap feels cheap for the price. Overall decent value."
};

const SIGNAL_META = {
  word_count:         { label: 'word count',     color: '#5b6bff', max: 300 },
  lexical_diversity:  { label: 'lex diversity',  color: '#2ed573', max: 100 },
  exclamation_ratio:  { label: 'excl. ratio %',  color: '#ff4757', max: 20  },
  avg_word_length:    { label: 'avg word len',   color: '#ffa502', max: 8   },
  caps_ratio:         { label: 'caps ratio %',   color: '#ff6b81', max: 20  },
  repetition_score:   { label: 'repetition %',  color: '#eccc68', max: 50  },
};

let history = [];

function loadExample(type) {
  document.getElementById('reviewText').value = EXAMPLES[type];
}

async function analyze() {
  const text = document.getElementById('reviewText').value.trim();
  if (!text || text.length < 5) return;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing…';
  hideError();

  showResultCard();
  resetResult();

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        user_id: document.getElementById('userId').value || 'unknown',
        product_id: document.getElementById('productId').value || 'unknown',
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Server error');
    }

    const data = await res.json();
    renderResult(data, text);

  } catch (e) {
    showError(e.message || 'Could not reach the API. Make sure the FastAPI server is running.');
    resetResult(true);
  }

  btn.disabled = false;
  btn.textContent = 'Analyze review';
}

function showResultCard() {
  const card = document.getElementById('resultCard');
  card.classList.add('show');
  card.style.display = 'block';
}

function resetResult(error = false) {
  const banner = document.getElementById('verdictBanner');
  banner.className = 'verdict-banner loading';
  document.getElementById('verdictIcon').innerHTML = error
    ? '<span style="font-size:20px;">✕</span>'
    : '<div class="spinner"></div>';
  document.getElementById('verdictLabel').textContent = error ? 'Error' : 'Analyzing…';
  document.getElementById('verdictSub').textContent = error ? 'Check error below' : 'Running BERT inference';
  document.getElementById('confPct').textContent = '—';
  document.getElementById('fakeProb').textContent = '—';
  document.getElementById('genuineProb').textContent = '—';
  document.getElementById('barFill').style.width = '0';
  document.getElementById('barFill').className = 'bar-fill';
  document.getElementById('signalsGrid').innerHTML = '';
  document.getElementById('flagsList').innerHTML = '';
}

function renderResult(data, text) {
  const isFake = data.verdict === 'FAKE';
  const cls    = isFake ? 'fake' : 'genuine';

  // Banner
  const banner = document.getElementById('verdictBanner');
  banner.className = `verdict-banner ${cls}`;
  document.getElementById('verdictIcon').innerHTML = isFake ? '✕' : '✓';
  document.getElementById('verdictLabel').textContent = isFake ? 'Likely Fake' : 'Likely Genuine';
  document.getElementById('verdictSub').textContent =
    `${data.confidence}% confidence · ${data.signals.word_count} words analyzed`;

  // Confidence bar
  document.getElementById('confPct').textContent = data.confidence + '%';
  document.getElementById('fakeProb').textContent = data.fake_probability + '%';
  document.getElementById('genuineProb').textContent = data.genuine_probability + '%';
  const fill = document.getElementById('barFill');
  fill.className = `bar-fill ${cls}`;
  setTimeout(() => { fill.style.width = data.confidence + '%'; }, 60);

  // Signals
  const grid = document.getElementById('signalsGrid');
  grid.innerHTML = Object.entries(data.signals).map(([key, val]) => {
    const meta  = SIGNAL_META[key] || { label: key, color: '#5b6bff', max: 100 };
    const pct   = Math.min((val / meta.max) * 100, 100).toFixed(0);
    const display = typeof val === 'number' && !Number.isInteger(val)
      ? val.toFixed(1) : val;
    return `<div class="signal-chip">
      <div class="sc-label">${meta.label}</div>
      <div class="sc-value">${display}</div>
      <div class="sc-bar"><div class="sc-fill" style="width:${pct}%;background:${meta.color}"></div></div>
    </div>`;
  }).join('');

  // Red flags
  const flagsList = document.getElementById('flagsList');
  if (data.red_flags.length === 0) {
    flagsList.innerHTML = '<span class="no-flags">✓ No red flags detected</span>';
  } else {
    flagsList.innerHTML = data.red_flags
      .map(f => `<span class="flag-tag">${f}</span>`)
      .join('');
  }

  addHistory(text, data.verdict, data.confidence);
}

function addHistory(text, verdict, conf) {
  history.unshift({ text: text.slice(0, 90) + (text.length > 90 ? '…' : ''), verdict, conf });
  if (history.length > 6) history.pop();

  const card = document.getElementById('historyCard');
  card.style.display = 'block';

  document.getElementById('historyList').innerHTML = history.map((h, i) =>
    `<div class="history-item" onclick="reloadHistory(${i})">
      <span class="h-badge ${h.verdict === 'FAKE' ? 'fake' : 'genuine'}">${h.verdict}</span>
      <span class="h-text">${h.text}</span>
      <span class="h-conf">${h.conf}%</span>
    </div>`
  ).join('');
}

function reloadHistory(i) {
  document.getElementById('reviewText').value = history[i].text;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.classList.add('show');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

document.getElementById('reviewText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) analyze();
});
</script>
</body>
</html>
